name: Bug report
description: Report a reproducible bug or unexpected behavior in LazyCron.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve LazyCron. Clear repro steps help us triage faster.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Describe the issue in plain language.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the issue.
      placeholder: |
        1. Run command ...
        2. Open file ...
        3. Observe output ...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: Expected output, state change, or behavior.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What actually happened?
      placeholder: Include error messages, logs, or screenshots.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      description: e.g., macOS Sonoma, Ubuntu 24.04
      placeholder: macOS Sonoma
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go version
      description: Output of `go version`
      placeholder: go1.25.0
    validations:
      required: true

  - type: input
    id: lazycron-version
    attributes:
      label: LazyCron version
      description: Version from `lazycron --version` if available, or commit/tag.
      placeholder: v0.0.0

  - type: textarea
    id: logs
    attributes:
      label: Logs, output, or screenshots
      description: Paste relevant output or attach screenshots.
      placeholder: Add logs or terminal output here.
