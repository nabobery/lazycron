version: 2

project_name: lazycron
env:
  - CGO_ENABLED=0

builds:
  - id: lazycron
    main: ./cmd/lazycron
    binary: lazycron
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w

archives:
  - id: archives
    builds:
      - lazycron
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"
